<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rayos del sol -->
  <g stroke="#F6B40E" stroke-width="5" stroke-linecap="round">
    <line x1="50" y1="5"  x2="50" y2="20"/>
    <line x1="50" y1="80" x2="50" y2="95"/>
    <line x1="5"  y1="50" x2="20" y2="50"/>
    <line x1="80" y1="50" x2="95" y2="50"/>
    <line x1="16" y1="16" x2="27" y2="27"/>
    <line x1="73" y1="73" x2="84" y2="84"/>
    <line x1="84" y1="16" x2="73" y2="27"/>
    <line x1="27" y1="73" x2="16" y2="84"/>
    <!-- rayos intermedios -->
    <line x1="28" y1="8"  x2="33" y2="22"/>
    <line x1="72" y1="78" x2="67" y2="92"/>
    <line x1="92" y1="28" x2="78" y2="33"/>
    <line x1="8"  y1="72" x2="22" y2="67"/>
    <line x1="8"  y1="28" x2="22" y2="33"/>
